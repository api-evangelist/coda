      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-analytics.listpackformulaanalytics
      with:
        packFormulaNames: tools.packFormulaNames
        packFormulaTypes: tools.packFormulaTypes
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
    - name: get-analytics-last-updated-day
      description: Get analytics last updated day
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-analytics.getanalyticslastupdated
      outputParameters:
      - type: object
        mapping: $.
