naftiko: 1.0.0-alpha2
info:
  label: Coda API — Miscellaneous
  description: 'Coda API — Miscellaneous. 2 operations. Lead operation: Get mutation status. Self-contained Naftiko capability
    covering one Coda business surface.'
  tags:
  - Coda
  - Miscellaneous
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CODA_API_KEY: CODA_API_KEY
capability:
  consumes:
  - type: http
    namespace: coda-miscellaneous
    baseUri: https://coda.io/apis/v1
    description: Coda API — Miscellaneous business capability. Self-contained, no shared references.
    resources:
    - name: mutationStatus-requestId
      path: /mutationStatus/{requestId}
      operations:
      - name: getmutationstatus
        method: GET
        description: Get mutation status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: resolveBrowserLink
      path: /resolveBrowserLink
      operations:
      - name: resolvebrowserlink
        method: GET
        description: Resolve browser link
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: url
          in: query
          type: string
          description: The browser link to try to resolve.
          required: true
        - name: degradeGracefully
          in: query
          type: boolean
          description: By default, attempting to resolve the Coda URL of a deleted object will result in an error. If this
            flag is set, the next-available object, all the way up to th
    authentication:
      type: bearer
      token: '{{env.CODA_API_KEY}}'
  exposes:
  - type: rest
    namespace: coda-miscellaneous-rest
    port: 8080
    description: REST adapter for Coda API — Miscellaneous. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/mutationstatus/{requestid}
      name: mutationstatus-requestid
      description: REST surface for mutationStatus-requestId.
      operations:
      - method: GET
        name: getmutationstatus
        description: Get mutation status
        call: coda-miscellaneous.getmutationstatus
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/resolvebrowserlink
      name: resolvebrowserlink
      description: REST surface for resolveBrowserLink.
      operations:
      - method: GET
        name: resolvebrowserlink
        description: Resolve browser link
        call: coda-miscellaneous.resolvebrowserlink
        with:
          url: rest.url
          degradeGracefully: rest.degradeGracefully
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: coda-miscellaneous-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coda API — Miscellaneous. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-mutation-status
      description: Get mutation status
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-miscellaneous.getmutationstatus
      outputParameters:
      - type: object
        mapping: $.
    - name: resolve-browser-link
      description: Resolve browser link
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-miscellaneous.resolvebrowserlink
      with:
        url: tools.url
        degradeGracefully: tools.degradeGracefully
      outputParameters:
      - type: object
        mapping: $.
