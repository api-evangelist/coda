naftiko: 1.0.0-alpha2
info:
  label: Coda API — Folders
  description: 'Coda API — Folders. 5 operations. Lead operation: List folders. Self-contained Naftiko capability covering
    one Coda business surface.'
  tags:
  - Coda
  - Folders
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CODA_API_KEY: CODA_API_KEY
capability:
  consumes:
  - type: http
    namespace: coda-folders
    baseUri: https://coda.io/apis/v1
    description: Coda API — Folders business capability. Self-contained, no shared references.
    resources:
    - name: folders
      path: /folders
      operations:
      - name: listfolders
        method: GET
        description: List folders
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspaceId
          in: query
          type: string
          description: Show only folders belonging to the given workspace.
        - name: isStarred
          in: query
          type: boolean
          description: If true, returns folders that are starred. If false, returns folders that are not starred. If not specified,
            returns all folders.
      - name: createfolder
        method: POST
        description: Create folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: folders-folderId
      path: /folders/{folderId}
      operations:
      - name: getfolder
        method: GET
        description: Get folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatefolder
        method: PATCH
        description: Update folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deletefolder
        method: DELETE
        description: Delete folder
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.CODA_API_KEY}}'
  exposes:
  - type: rest
    namespace: coda-folders-rest
    port: 8080
    description: REST adapter for Coda API — Folders. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/folders
      name: folders
      description: REST surface for folders.
      operations:
      - method: GET
        name: listfolders
        description: List folders
        call: coda-folders.listfolders
        with:
          workspaceId: rest.workspaceId
          isStarred: rest.isStarred
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createfolder
        description: Create folder
        call: coda-folders.createfolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/folders/{folderid}
      name: folders-folderid
      description: REST surface for folders-folderId.
      operations:
      - method: GET
        name: getfolder
        description: Get folder
        call: coda-folders.getfolder
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updatefolder
        description: Update folder
        call: coda-folders.updatefolder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deletefolder
        description: Delete folder
        call: coda-folders.deletefolder
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: coda-folders-mcp
    port: 9090
    transport: http
    description: MCP adapter for Coda API — Folders. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-folders
      description: List folders
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-folders.listfolders
      with:
        workspaceId: tools.workspaceId
        isStarred: tools.isStarred
      outputParameters:
      - type: object
        mapping: $.
    - name: create-folder
      description: Create folder
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: coda-folders.createfolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-folder
      description: Get folder
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: coda-folders.getfolder
      outputParameters:
      - type: object
        mapping: $.
    - name: update-folder
      description: Update folder
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: coda-folders.updatefolder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-folder
      description: Delete folder
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: coda-folders.deletefolder
      outputParameters:
      - type: object
        mapping: $.
