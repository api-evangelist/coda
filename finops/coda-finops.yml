meters:
- name: doc_maker_seats
  description: Monthly subscription per active Doc Maker. Pro $12/Maker, Team $36/Maker,
    Enterprise contract.
  unit: seat
  aggregation: sum
  dimensions:
  - workspace
  - plan
principles:
- name: Visibility
  description: Use Coda workspace billing reports to see active Doc Makers and right-size
    seat counts.
- name: Allocation
  description: Allocate seats to teams/cost centers based on Doc Maker membership; editors
    and viewers are free and need no allocation.
- name: Optimization
  description: Encourage editor/viewer usage where doc-creation is not needed; consolidate
    inactive Doc Makers; pick the lowest tier that meets feature needs.
- name: Accountability
  description: Assign each workspace to a budget owner; review monthly Doc Maker counts and
    plan tier alignment.
