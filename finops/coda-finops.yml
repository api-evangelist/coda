description: FOCUS-aligned FinOps profile for Coda. Coda bills primarily on a per-Doc-Maker
  monthly subscription basis. Editors, viewers, and the public API are free across all
  tiers. There is no metered API surcharge; costs scale with the count of Doc Makers and
  selected plan tier.
