servers:
- url: https://coda.io/apis/v1
  description: Coda API (v1)
security:
- Bearer: []
tags:
- name: Miscellaneous
  description: 'These endpoints wouldn''t fit anywhere else, but you may find them useful when working with Coda.

    '
paths:
  /resolveBrowserLink:
    get:
      summary: Resolve browser link
      description: 'Given a browser link to a Coda object, attempts to find it and return metadata that can be used to get more info on it. Returns a 400 if the URL does not appear to be a Coda URL or a 404 if the resource cannot be located with the current credentials.

        '
      operationId: resolveBrowserLink
      tags:
      - Miscellaneous
      parameters:
      - name: url
        description: The browser link to try to resolve.
        in: query
        required: true
        example: https://coda.io/d/_dAbCDeFGH/Launch-Status_sumnO
        schema:
          type: string
          format: url
      - name: degradeGracefully
        description: 'By default, attempting to resolve the Coda URL of a deleted object will result in an error. If this flag is set, the next-available object, all the way up to the doc itself, will be resolved.

          '
        in: query
        example: true
        schema:
          type: boolean
      responses:
        '200':
          description: Metadata for the resolved resource.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiLink'
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
      x-pack-hidden: true
      x-codeSamples:
      - label: Python 3.13
        lang: python
        source: "import requests\n\nheaders = {'Authorization': 'Bearer <your API token>'}\nuri = 'https://coda.io/apis/v1/resolveBrowserLink'\nparams = {\n  'url': 'https://coda.io/d/Some-Doc_d<doc ID>/#To-do-List_tu<table ID>',\n}\nres = requests.get(uri, headers=headers, params=params).json()\nresolved_uri = res[\"resource\"][\"href\"]\n\nres = requests.get(resolved_uri, headers=headers).json()\nprint(f'This link points to a {res[\"type\"]} named {res[\"name\"]}')\n# => This link points to a table named To-do List\n"
      - label: Shell
        lang: shell
        source: "RESOLVED_RESOURCE_URI=\"$(curl -s -H 'Authorization: Bearer <your API token>' \\\n  -G --data-urlencode 'url=https://coda.io/d/Some-Doc_d<doc ID>/#To-do-List_tu<table ID>' \\\n  'https://coda.io/apis/v1/resolveBrowserLink' |\n  jq -r '.resource.href')\"\ncurl -s -H 'Authorization: Bearer <your API token>' \\\n  \"$RESOLVED_RESOURCE_URI\" |\n  jq '\"This link points to a \" + .type + \" named \" + .name'\n# => \"This link points to a table named To-do List\"\n"
      - label: Google Apps Script
        lang: javascript
        source: '// Import the CodaAPI library via Resource->Libraries...:

          // 15IQuWOk8MqT50FDWomh57UqWGH23gjsWVWYFms3ton6L-UHmefYHS9Vl

          CodaAPI.authenticate(''<your API token>'');


          var url = ''https://coda.io/d/Some-Doc_d<doc ID>/#To-do-List_tu<table ID>'';

          var res = CodaAPI.resolveBrowserLink({url: url});

          Logger.log(''This link points to a '' + res.type + '' named '' + res.name);

          // => This link points to a table named To-do List

          '
  /mutationStatus/{requestId}:
    get:
      summary: Get mutation status
      description: 'Get the status for an asynchronous mutation to know whether or not it has been completed. Each API endpoint that mutates a document will return a request id that you can pass to this endpoint to check the completion status. Status information is not guaranteed to be available for more than one day after the mutation was completed. It is intended to be used shortly after the request was made.

        '
      operationId: getMutationStatus
      tags:
      - Miscellaneous
      parameters:
      - $ref: '#/components/parameters/requestId'
      responses:
        '200':
          description: Info about the mutation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MutationStatus'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '429':
          $ref: '#/components/responses/TooManyRequestsError'
      x-codeSamples:
      - label: Python 3.13
        lang: python
        source: 'import requests


          headers = {''Authorization'': ''Bearer <your API token>''}

          uri = ''https://coda.io/apis/v1/mutationStatus/some-request-id''

          res = requests.get(uri, headers=headers).json()


          print(f''Request has completed? {res["completed"]}'')

          # => Request has completed? false

          '
      - label: Shell
        lang: shell
        source: "curl -s -H 'Authorization: Bearer <your API token>' \\\n  'https://coda.io/apis/v1/mutationStatus/some-request-id' |\n  jq .completed\n# => true\n"
      - label: Google Apps Script
        lang: javascript
        source: '// Import the CodaAPI library via Resource->Libraries...:

          // 15IQuWOk8MqT50FDWomh57UqWGH23gjsWVWYFms3ton6L-UHmefYHS9Vl

          CodaAPI.authenticate(''<your API token>'');

          Logger.log(''Request has completed? '' + CodaAPI.mutationStatus(''some-request-id'').completed);

          // => Request has completed? false

          '
