        lang: python
        source: 'import requests


          headers = {''Authorization'': ''Bearer <your API token>''}

          uri = f''https://coda.io/apis/v1/docs/<doc ID>/tables/<table ID>/rows/<row ID>''

          req = requests.delete(uri, headers=headers)

