specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Coda
providerId: coda
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Productivity
- Docs
- No-Code
- Collaboration
- Database
- Plans
description: Coda plans reconciled against the public Coda pricing page. Coda bills per
  Doc Maker (anyone who creates or edits docs); editors and viewers are free across all
  paid tiers. The API is included on every tier including Free, with rate-limit and feature
  differences at higher tiers.
sources:
- https://coda.io/pricing
- https://coda.io/developers/apis/v1
plans:
- id: coda-free
  name: Free
  type: free
  description: Free tier with unlimited docs of limited size. API is included.
  entries:
  - label: Doc Makers
    name: doc_makers
    type: flat
    metric: maker
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  - label: Editors and Viewers
    name: editors_viewers
    type: flat
    metric: user
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 0
    userMultiplied: false
  elements:
  - name: Unlimited Docs (Limited Doc Size)
  - name: API Access
  - name: Packs (Public)
- id: coda-pro
  name: Pro
  type: paid
  description: Pro plan for individuals and small teams; per-Doc-Maker pricing.
  entries:
  - label: Per-Doc-Maker Subscription
    name: doc_maker_seat
    type: flat
    metric: maker
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 12
    userMultiplied: true
  elements:
  - name: Unlimited Doc Size
  - name: 30-Day Version History
  - name: Hidden Pages
  - name: Custom Doc Branding
  - name: Pro Packs
- id: coda-team
  name: Team
  type: paid
  description: Team plan for cross-functional collaboration; per-Doc-Maker pricing.
  entries:
  - label: Per-Doc-Maker Subscription
    name: doc_maker_seat
    type: flat
    metric: maker
    limit: -1
    timeFrame: monthly
    geo: global
    unit: 1
    price: 36
    userMultiplied: true
  elements:
  - name: Unlimited Version History
  - name: Cross-Doc Sync
  - name: Unlimited Automations
  - name: Premium Packs
  - name: Audit Events
  - name: Folder Permissions
- id: coda-enterprise
  name: Enterprise
  type: enterprise
  description: For large organizations; custom contract pricing with advanced governance and
    security features.
  entries:
  - label: Per-Doc-Maker Subscription
    name: doc_maker_seat
    type: flat
    metric: maker
    limit: -1
    timeFrame: annual
    geo: global
    unit: 1
    price: contact sales
    userMultiplied: true
  elements:
  - name: SAML SSO
  - name: SCIM Provisioning
  - name: Advanced Permissions and DLP
  - name: Audit Logs
  - name: Dedicated Customer Success
  - name: Enterprise SLA
maintainers:
