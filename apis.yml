    tags:
      - Packs
      - Extensions
      - SDK
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/packs/build/latest/
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/packs/build/latest/
        type: Documentation
      - url: https://github.com/coda/packs-sdk
        type: SDK
    description: >-
      Build and publish Coda Packs — TypeScript-based extensions that add custom formulas, sync tables, action buttons, and OAuth-authenticated integrations to Coda docs.
