    name: Coda Automations API
    tags:
      - Automations
      - Webhooks
      - Triggers
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Trigger automation rules and inspect automation execution within a Coda doc.
  - aid: coda:coda-permissions-api
    name: Coda Permissions API
    tags:
      - Permissions
      - Sharing
      - ACL
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Manage doc-level sharing, ACLs, and access controls. Add, modify, or revoke user/group permissions.
  - aid: coda:coda-publishing-api
    name: Coda Publishing API
    tags:
      - Publishing
      - Public Docs
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Publish and unpublish Coda docs to the public web, including category and discoverability metadata.
  - aid: coda:coda-account-api
    name: Coda Account API
    tags:
      - Account
      - User
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Retrieve information about the authenticated user (whoami).
  - aid: coda:coda-analytics-api
    name: Coda Analytics API
