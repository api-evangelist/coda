aid: coda
url: https://raw.githubusercontent.com/api-evangelist/coda/refs/heads/main/apis.yml
name: Coda
x-type: company
description: >-
  Coda is an all-in-one doc platform combining documents, spreadsheets, and apps. The Coda API exposes docs, pages, tables, rows, columns, controls, formulas, automations, packs, permissions, and analytics for programmatic integration.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Productivity
  - Docs
  - No-Code
  - Collaboration
  - Database
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: coda:coda-docs-api
    name: Coda Docs API
    tags:
      - Docs
      - Documents
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      List, create, copy, share, and manage Coda documents. Provides the top-level container for pages, tables, and other elements within a workspace.
  - aid: coda:coda-folders-api
    name: Coda Folders API
    tags:
      - Folders
      - Workspaces
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Organize and retrieve folders that contain Coda docs within a workspace.
  - aid: coda:coda-pages-api
    name: Coda Pages API
    tags:
      - Pages
      - Content
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Manage document structure and page content. Create, update, and retrieve hierarchical pages within a Coda doc.
  - aid: coda:coda-tables-api
    name: Coda Tables API
    tags:
      - Tables
      - Database
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Access table resources within docs. List, retrieve, and inspect tables and their schema.
  - aid: coda:coda-columns-api
    name: Coda Columns API
    tags:
      - Columns
      - Schema
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Retrieve column definitions, types, and metadata for tables in a Coda doc.
  - aid: coda:coda-rows-api
    name: Coda Rows API
    tags:
      - Rows
      - Records
      - CRUD
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Read, insert, upsert, update, and delete table rows. Primary CRUD surface for table data; supports filtering, sorting, and column-key references.
  - aid: coda:coda-formulas-api
    name: Coda Formulas API
    tags:
      - Formulas
      - Compute
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Access named formula definitions and evaluate them within a doc.
  - aid: coda:coda-controls-api
    name: Coda Controls API
    tags:
      - Controls
      - UI
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://coda.io/developers/apis/v1
    baseURL: https://coda.io/apis/v1
    properties:
      - url: https://coda.io/developers/apis/v1
        type: Documentation
    description: >-
      Read and update interactive controls embedded in a Coda doc (sliders, dropdowns, checkboxes, buttons).
